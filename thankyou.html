<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgentPie — Thank You</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0b1120;
    --text-primary: #e8eaf0;
    --text-muted: #8b91a8;
    --text-faint: #3d4560;
    --accent: #e8734a;
  }

  html { height: 100%; }

  body {
    background: var(--bg);
    color: var(--text-primary);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 2rem;
    overflow-y: auto;
    text-align: center;
  }

  .wordmark {
    font-family: 'Comfortaa', cursive;
    font-weight: 700;
    font-size: 1.9rem;
    color: var(--accent);
    margin-bottom: 3rem;
  }

  .divider {
    width: 36px;
    height: 1px;
    background: var(--text-faint);
    margin: 0 auto 2rem;
  }

  .message {
    font-size: 1.4rem;
    line-height: 1.3;
    color: var(--text-primary);
    font-weight: 300;
    max-width: 400px;
  }

  .back-link {
    display: inline-block;
    margin-top: 2.5rem;
    font-size: 0.82rem;
    color: var(--text-faint);
    text-decoration: none;
    letter-spacing: 0.02em;
    transition: color 0.2s ease;
  }

  .back-link:hover { color: var(--accent); }
</style>
</head>
<body>

  <div class="wordmark">AgentPie.ai</div>

  <div class="divider"></div>

  <div class="message">
    We confirm your request to be updated. Thank you.
  </div>

  <a href="https://agentpie.ai" class="back-link">Share AgentPie.ai with others &rarr;</a>

</body>
</html>
